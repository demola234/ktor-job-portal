version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: jobportal
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
  job-portal:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      DB_URL: jdbc:postgresql://db:5432/jobportal
      DB_USER: admin
      DB_PASSWORD: admin