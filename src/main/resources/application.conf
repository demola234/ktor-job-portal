ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [ com.jobportal.ApplicationKt.module ]
    }
}

jwt {
    secret = ${?JWT_SECRET}
    secret = "dev-secret-change-in-production"
}

database {
    url      = ${?DATABASE_URL}
    url      = "jdbc:postgresql://localhost:5432/jobportal"
    user     = ${?DATABASE_USER}
    user     = "postgres"
    password = ${?DATABASE_PASSWORD}
    password = "secret"
}


